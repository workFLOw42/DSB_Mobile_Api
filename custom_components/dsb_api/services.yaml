fetch_updates:
  name: "DSB Plan manuell laden"
  description: "Erzwingt eine sofortige Aktualisierung der Vertretungspläne von der DSB API."
  fields:
    child_name:
      name: "Kindname"
      description: "Kurzname des Kindes (z.B. MAX). Leer = alle Kinder."
      required: false
      example: "MAX"
      selector:
        text:

reload_schedule:
  name: "Stundenplan neu laden"
  description: "Lädt die Stundenplan-YAML neu, ohne Home Assistant neu zu starten."
  fields:
    child_name:
      name: "Kindname"
      description: "Kurzname des Kindes (z.B. MAX). Leer = alle Kinder."
      required: false
      example: "MAX"
      selector:
        text:

set_hash:
  name: "Hash setzen"
  description: "Setzt einen Hash-Wert für die Änderungserkennung."
  fields:
    child_name:
      name: "Kindname"
      description: "Kurzname des Kindes (z.B. MAX)"
      required: true
      example: "MAX"
      selector:
        text:
    hash_key:
      name: "Hash-Schlüssel"
      description: "Welcher Hash gesetzt werden soll"
      required: true
      selector:
        select:
          options:
            - "exams"
            - "termine"
            - "yaml"
    hash_value:
      name: "Hash-Wert"
      description: "Der zu speichernde Hash-Wert"
      required: true
      example: "a3f8c2d1..."
      selector:
        text:
